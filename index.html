        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          try {
            var url = new URL(redirect);
            // Strip trailing slash from pathname (except bare root)
            if (url.pathname.length > 1 && url.pathname.slice(-1) === '/') {
              url.pathname = url.pathname.slice(0, -1);
            }
            history.replaceState(null, null, url.pathname + url.search + url.hash);
          } catch (e) {
            // Fallback for browsers without URL constructor
            if (redirect !== location.href) {
              history.replaceState(null, null, redirect);
            }
          }
        }
      })();
    </script>
