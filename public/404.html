<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Kraftykinni</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Preserve the path and query string in sessionStorage
      // then redirect to index.html
      var l = window.location;
      sessionStorage.redirect = l.href;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/'
      );
    </script>
  </head>
  <body></body>
</html>
