<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Kraftykinni</title>
    <script>
      // GitHub Pages serves this 404.html when a URL doesn't match a file.
      // This script redirects back to index.html with the path as a query param,
      // then index.html's script reads it and restores the URL for React Router.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/' +
        '?p=/' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
