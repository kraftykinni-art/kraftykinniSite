<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Kraftykinni</title>
    <script>
      (function () {
        var l = window.location;

        // 1. Enforce non-www on GitHub Pages custom domain
        if (l.hostname === 'www.kraftykinni.in') {
          l.replace(
            'https://kraftykinni.in' +
            l.pathname.replace(/\/+$/, '') + // strip trailing slash too
            l.search +
            l.hash
          );
          return;
        }

        // 2. Strip trailing slash from pathname (except bare root "/")
        var path = l.pathname;
        if (path.length > 1 && path.slice(-1) === '/') {
          path = path.slice(0, -1);
        }

        // 3. Store the clean canonical URL in sessionStorage, redirect to root
        //    (index.html restores it via history.replaceState — no flash)
        sessionStorage.redirect =
          l.protocol + '//' + l.hostname +
          (l.port ? ':' + l.port : '') +
          path + l.search + l.hash;

        l.replace(
          l.protocol + '//' + l.hostname +
          (l.port ? ':' + l.port : '') + '/'
        );
      })();
    </script>
  </head>
  <body></body>
</html>
