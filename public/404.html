<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Kraftykinni</title>
    <script>
      // GitHub Pages SPA routing fix.
      // When GitHub Pages 404s on a deep URL like /workshops/lippan-art,
      // it serves this file. We save the intended path to sessionStorage,
      // then redirect to the root. index.html reads it back and restores
      // the URL so React Router renders the correct page.
      sessionStorage.setItem('redirect', window.location.pathname + window.location.search + window.location.hash);
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
